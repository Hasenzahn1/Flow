<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FLOW{% endblock %}</title>

  <!-- IMPORTANT: bundled locally, NOT from a CDN (the ELW often has no internet) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pico.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>

  <header class="app-header">
    <div class="container app-header__inner">
      <div class="app-header__left">
        {% block header_extra %}{% endblock %}
        <div x-data="{upd:false}"
             x-init="const poll=async()=>{try{upd=(await(await fetch('/api/update/check')).json()).available}catch(e){}};poll();setInterval(poll,600000)">
            <button x-show="upd" style="display:none" class="update-btn"
                  @click="if(confirm('Update verfügbar – Server wird kurz neugestartet. Fortfahren?'))fetch('/api/update/apply',{method:'POST'})">
            &#8593; Update
          </button>
        </div>
      </div>
      <div class="app-header__clock" x-data="{
        time: '',
        date: '',
        tick() {
          const now = new Date();
          this.time = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          this.date = now.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }
      }" x-init="tick(); setInterval(() => tick(), 1000)">
        <b x-text="time"></b>
        <span x-text="date"></span>
      </div>
      <a href="/" class="app-header__brand">
        <img src="{{ url_for('static', filename='images/Logo.svg') }}" alt="FLOW" class="app-header__logo">
      </a>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="app-footer">
    <div class="container">
      <small>{% block footer %}Made by &middot; Fabian Reuther{% endblock %}</small>
    </div>
  </footer>

  <!-- Page-specific JS first (registers the alpine:init listener) ... -->
  {% block scripts %}{% endblock %}
  <!-- ... then Alpine (defer). This guarantees the listener exists before Alpine starts. -->
  <script defer src="{{ url_for('static', filename='js/alpine.min.js') }}"></script>
</body>
</html>
