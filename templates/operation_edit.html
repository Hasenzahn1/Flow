{% extends "base.html" %}

{% block title %}Einsatzübersicht - FLOW{% endblock %}

{% block header_extra %}
<div x-data class="header-operation">
  <b>Einsatzübersicht - {{ operation.name }}</b>
  <span class="connection-badge"
    :class="$store.connection.online ? 'connection-badge--online' : 'connection-badge--offline'">
    <span class="connection-badge__dot"></span>
    <span x-text="$store.connection.online ? 'Verbunden' : 'Keine Verbindung'"></span>
  </span>
</div>
{% endblock %}

{% block content %}
<section x-data='editPage({{ operation|tojson }})'
  @keydown.window="handleKeydown($event)"
  @mission-opened.window="activeMissionId = $event.detail.id"
  @mission-closed.window="activeMissionId = null">

  <!-- ── Suche ─────────────────────────────────────────────── -->
  <div class="search-bar">
    <input class="search-bar__input" type="search" placeholder="Suche nach Ort, Einheit, Patient …" x-model="search">
    <a href="/api/operation_overview/{{ operation.id }}/export"
       class="btn-export" title="Als PDF exportieren">&#x2193; PDF</a>
  </div>

  <!-- ── Aktuelle Einsätze ─────────────────────────────────── -->
  <h2>Aktuell (<span x-text="filteredMissions(current_missions).length"></span>)</h2>
  <p class="empty-hint" x-show="current_missions.length === 0">Keine aktuellen Einsätze</p>

  <template x-for="(mission, i) in filteredMissions(current_missions)" :key="mission.id">
    <div class="mission-card" x-data="{ open: false }" :class="'mission-card--status-' + mission.status + (activeMissionId === mission.id ? ' mission-card--active' : '')">
      <div class="mission-triage-bar" :style="triageBarStyle(mission.persons)"></div>

      <!-- Row 1: Summary bar -->
      <div class="mission-card__summary" @click="open = !open; $dispatch(open ? 'mission-opened' : 'mission-closed', { id: mission.id })">
        <strong class="mission-summary__number" x-text="mission.number"></strong>

        <div class="mission-summary__status" @click.stop>
          <select class="inline-select"
              @change="saveField('mission', mission.id, 'status', parseInt($event.target.value), operation_id)">
              <option value="0" :selected="mission.status == 0">Neu</option>
              <option value="1" :selected="mission.status == 1">In Bearbeitung</option>
              <option value="2" :selected="mission.status == 2">Abgeschlossen</option>
          </select>
          <span x-text="formatTime(mission.changed_at)"></span>
        </div>

        <div class="mission-summary__field" x-data="inlineField('mission', mission.id, 'place', operation_id)" @click.stop>
          <span class="mission-summary__label">Ort:</span>
          <div class="inline-edit-wrapper">
            <span class="inline-editable" x-show="!editing" @click="open(mission.place)" x-text="mission.place || '—'"></span>
            <div x-show="editing">
              <input x-ref="inp" x-model="input" class="inline-input"
                :size="Math.max(2, (input || '—').length)"
                @input="doFilter()" @keydown.tab="tabComplete($event)"
                @keydown.enter.prevent="save()" @keydown.escape="editing = false; filtered = []"
                @blur="save()">
              <ul class="autocomplete-list" x-show="filtered.length > 0" @mousedown.prevent>
                <template x-for="(opt, idx) in filtered" :key="idx">
                  <li @click="input = opt; save()" x-text="opt"></li>
                </template>
              </ul>
            </div>
          </div>
        </div>

        <div class="mission-summary__field" x-data="inlineField('mission', mission.id, 'unit', operation_id)" @click.stop>
          <span class="mission-summary__label">Einheit:</span>
          <div class="inline-edit-wrapper">
            <span class="inline-editable" x-show="!editing" @click="open(mission.unit)" x-text="mission.unit || '—'"></span>
            <div x-show="editing">
              <input x-ref="inp" x-model="input" class="inline-input"
                :size="Math.max(2, (input || '—').length)"
                @input="doFilter()" @keydown.tab="tabComplete($event)"
                @keydown.enter.prevent="save()" @keydown.escape="editing = false; filtered = []"
                @blur="save()">
              <ul class="autocomplete-list" x-show="filtered.length > 0" @mousedown.prevent>
                <template x-for="(opt, idx) in filtered" :key="idx">
                  <li @click="input = opt; save()" x-text="opt"></li>
                </template>
              </ul>
            </div>
          </div>
        </div>

        <span class="mission-summary__persons" x-text="mission.persons.length + ' Pat.'"></span>
        <button class="delete-btn" @click.stop="deleteMission(mission.id, mission.number)" title="Einsatz löschen">&#x2715;</button>
        <span class="mission-card__chevron" :class="{ 'mission-card__chevron--open': open }">&#x25BC;</span>
      </div>

      <!-- Row 2: Description (always visible) -->
      <div class="mission-description">
        <span class="mission-description__label">Beschreibung:</span>
        <textarea class="field-textarea"
          :value="mission.description"
          x-init="$nextTick(() => { $el.style.height = '0'; $el.style.height = $el.scrollHeight + 'px' })"
          @input="$el.style.height = '0'; $el.style.height = $el.scrollHeight + 'px'"
          @blur="saveField('mission', mission.id, 'description', $event.target.value, operation_id)"></textarea>
      </div>

      <!-- Persons (expanded only) -->
      <div class="mission-persons" x-show="open">
        <template x-for="(person, j) in mission.persons" :key="j">
          <div class="person-card" x-data="{ open: false }" :class="'person-card--triage-' + person.triage"
            x-effect="open && $nextTick(() => $el.querySelectorAll('.field-textarea').forEach(t => { t.style.height = '0'; t.style.height = t.scrollHeight + 'px' }))">
            <button class="person-card__header" @click="open = !open">
              <span x-text="'Patient ' + person.number" style="margin-right: 0.2rem"></span>
              <span class="delete-btn delete-btn--person" @click.stop="deletePerson(person.id, person.number, mission.id)" title="Patient löschen">&#x2715;</span>
              <span class="person-card__chevron" :class="{ 'person-card__chevron--open': open }">&#x25BC;</span>
            </button>
            <div class="person-card__columns" x-show="open">
              <div>
                <div class="person-card__row" x-data="inlineField('person', person.id, 'last_name', operation_id)">
                  <span class="person-card__label">Nachname: </span>
                  <div class="inline-edit-wrapper">
                    <span class="inline-editable" x-show="!editing" @click="open(person.last_name)" x-text="person.last_name || '—'"></span>
                    <div x-show="editing">
                      <input x-ref="inp" x-model="input" class="inline-input"
                        :size="Math.max(2, (input || '—').length)"
                        @input="doFilter()" @keydown.tab="tabComplete($event)"
                        @keydown.enter.prevent="save()" @keydown.escape="editing = false; filtered = []"
                        @blur="save()">
                      <ul class="autocomplete-list" x-show="filtered.length > 0" @mousedown.prevent>
                        <template x-for="(opt, idx) in filtered" :key="idx">
                          <li @click="input = opt; save()" x-text="opt"></li>
                        </template>
                      </ul>
                    </div>
                  </div>
                </div>

                <div class="person-card__row" x-data="inlineField('person', person.id, 'name', operation_id)">
                  <span class="person-card__label">Vorname: </span>
                  <div class="inline-edit-wrapper">
                    <span class="inline-editable" x-show="!editing" @click="open(person.name)" x-text="person.name || '—'"></span>
                    <div x-show="editing">
                      <input x-ref="inp" x-model="input" class="inline-input"
                        :size="Math.max(2, (input || '—').length)"
                        @input="doFilter()" @keydown.tab="tabComplete($event)"
                        @keydown.enter.prevent="save()" @keydown.escape="editing = false; filtered = []"
                        @blur="save()">
                      <ul class="autocomplete-list" x-show="filtered.length > 0" @mousedown.prevent>
                        <template x-for="(opt, idx) in filtered" :key="idx">
                          <li @click="input = opt; save()" x-text="opt"></li>
                        </template>
                      </ul>
                    </div>
                  </div>
                </div>

                <div class="person-card__row" x-data="inlineDateField('person', person.id, 'birthdate', operation_id)">
                  <span class="person-card__label">Geb. Datum: </span>
                  <div class="inline-edit-wrapper">
                    <span class="inline-editable" x-show="!editing" @click="open(person.birthdate)" x-text="displayDate(person.birthdate)"></span>
                    <div x-show="editing">
                      <input x-ref="inp" type="date" x-model="input" class="inline-input"
                        @blur="save()" @keydown.enter.prevent="save()" @keydown.escape="editing = false">
                    </div>
                  </div>
                </div>
                <div class="person-card__row">
                  <span class="person-card__label">Geschlecht: </span>
                  <select class="inline-select" style="text-align: left"
                    @change="saveField('person', person.id, 'gender', $event.target.value, operation_id)">
                    <option value="" :selected="!person.gender">—</option>
                    <option value="Männlich" :selected="person.gender == 'Männlich'">Männlich</option>
                    <option value="Weiblich" :selected="person.gender == 'Weiblich'">Weiblich</option>
                    <option value="Divers" :selected="person.gender == 'Divers'">Divers</option>
                  </select>
                </div>
              </div>
              <div>
                <div class="person-card__row person-card__row--check">
                  <span class="person-card__label2">Verletzt: </span>
                  <input type="checkbox" class="inline-checkbox"
                    :checked="!!person.hurt"
                    @change="saveField('person', person.id, 'hurt', $event.target.checked ? 1 : 0, operation_id)">
                </div>

                <div class="person-card__row" x-data="inlineField('person', person.id, 'handover', operation_id)">
                  <span class="person-card__label2">Übergabe: </span>
                  <div class="inline-edit-wrapper">
                    <span class="inline-editable" x-show="!editing" @click="open(person.handover)" x-text="person.handover || '—'"></span>
                    <div x-show="editing">
                      <input x-ref="inp" x-model="input" class="inline-input"
                        :size="Math.max(2, (input || '—').length)"
                        @input="doFilter()" @keydown.tab="tabComplete($event)"
                        @keydown.enter.prevent="save()" @keydown.escape="editing = false; filtered = []"
                        @blur="save()">
                      <ul class="autocomplete-list" x-show="filtered.length > 0" @mousedown.prevent>
                        <template x-for="(opt, idx) in filtered" :key="idx">
                          <li @click="input = opt; save()" x-text="opt"></li>
                        </template>
                      </ul>
                    </div>
                  </div>
                </div>

                <div class="person-card__row person-card__row--check">
                  <span class="person-card__label2">Triage: </span>
                  <div class="triage-boxes">
                    <button class="triage-box triage-box--gray"   :class="{'triage-box--active': person.triage == 0}" @click="saveField('person', person.id, 'triage', 0, operation_id)"></button>
                    <button class="triage-box triage-box--green"  :class="{'triage-box--active': person.triage == 1}" @click="saveField('person', person.id, 'triage', 1, operation_id)"></button>
                    <button class="triage-box triage-box--yellow" :class="{'triage-box--active': person.triage == 2}" @click="saveField('person', person.id, 'triage', 2, operation_id)"></button>
                    <button class="triage-box triage-box--red"    :class="{'triage-box--active': person.triage == 3}" @click="saveField('person', person.id, 'triage', 3, operation_id)"></button>
                  </div>
                </div>
              </div>
            </div>
            
            <div class="person-card__row person-card__row--block" x-show="open">
                <span class="person-card__label2">Info:</span>
                <textarea class="field-textarea"
                :value="person.info"
                x-init="$nextTick(() => { $el.style.height = '0'; $el.style.height = $el.scrollHeight + 'px' })"
                @input="$el.style.height = '0'; $el.style.height = $el.scrollHeight + 'px'"
                @blur="saveField('person', person.id, 'info', $event.target.value, operation_id)"></textarea>
            </div>
          </div>
        </template>
        <button class="add-person-btn" @click="addPerson(mission.id)">+</button>
      </div>

    </div>
  </template>
  <button class="add-mission-btn" @click="addMission()">+</button>

{% block scripts %}
<script src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>

{% endblock %}
